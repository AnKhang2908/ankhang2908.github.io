        // Phonetic Vietnamese Spoken Sound Mapping for Consonants & Key Expressions
        const viConsonantMap = {
            'b': 'bờ',
            'c': 'cờ',
            'd': 'dờ',
            'đ': 'đờ',
            'g': 'gờ',
            'h': 'hờ',
            'k': 'cờ',
            'l': 'lờ',
            'm': 'mờ',
            'n': 'nờ',
            'p': 'pờ',
            'q': 'quờ',
            'r': 'rờ',
            's': 'sờ',
            't': 'tờ',
            'v': 'vờ',
            'x': 'xờ',
            'ch': 'chờ',
            'gh': 'gờ',
            'gi': 'giờ',
            'kh': 'khờ',
            'nh': 'nhờ',
            'ng': 'ngờ',
            'ngh': 'ngờ',
            'ng / ngh': 'ngờ',
            'ph': 'phờ',
            'qu': 'quờ',
            'th': 'thờ',
            'tr': 'trờ'
        };

        let currentAudio = null;

        // Enhanced Speech Synthesis Engine specifically for Native Vietnamese Sound
        function speak(text) {
            if (!text) return;

            // 1. Clean up Chinese text or translations inside parentheses e.g., "ba mươi (三十)" -> "ba mươi"
            let cleanText = text.replace(/[\u4e00-\u9fa5]/g, '').replace(/\([\s\S]*?\)/g, '').trim();

            // 2. Check if text is a single/compound consonant in dictionary map
            const lowerKey = cleanText.toLowerCase();
            if (viConsonantMap[lowerKey]) {
                cleanText = viConsonantMap[lowerKey];
            }

            if (!cleanText) return;

            // Stop any currently playing sound
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            const indicator = document.getElementById('speakingIndicator');
            if (indicator) indicator.style.opacity = '1';

            const rateSelect = document.getElementById('speechRate');
            const rate = rateSelect ? parseFloat(rateSelect.value) || 1.0 : 1.0;

            const hideIndicator = () => {
                if (indicator) indicator.style.opacity = '0';
            };

            // Primary Method: Google Vietnamese Audio TTS Engine (guarantees authentic Vietnamese accent on all OS)
            const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(cleanText)}`;
            const audio = new Audio(ttsUrl);
            currentAudio = audio;
            audio.playbackRate = rate;

            audio.onended = hideIndicator;
            audio.onerror = () => {
                // Secondary Fallback: Web Speech API (if offline or blocked)
                fallbackWebSpeech(cleanText, rate, hideIndicator);
            };

            audio.play().catch(err => {
                fallbackWebSpeech(cleanText, rate, hideIndicator);
            });
        }

        // Web Speech API fallback handler
        function fallbackWebSpeech(text, rate, callback) {
            if (!('speechSynthesis' in window)) {
                if (callback) callback();
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = rate;

            const voices = window.speechSynthesis.getVoices();
            const viVoice = voices.find(v => v.lang === 'vi-VN' || v.lang === 'vi_VN' || v.lang.startsWith('vi'));
            if (viVoice) {
                utterance.voice = viVoice;
            }

            utterance.onend = callback;
            utterance.onerror = callback;

            window.speechSynthesis.speak(utterance);
        }

        // Pre-load voices for Web Speech API
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };

        let currentSlide = 0;
        let scoreCount = 0;
        let answeredQuestions = {1: false, 2: false, 3: false, 4: false, 5: false, 6: false};

        // Render current slide with transition
        function renderSlide(index) {
            if (index < 0 || index >= slidesData.length) return;
            currentSlide = index;

            const slideContent = document.getElementById('slideContent');
            slideContent.classList.remove('slide-active');
            slideContent.classList.add('slide-enter');

            setTimeout(() => {
                slideContent.innerHTML = slidesData[currentSlide].content;
                slideContent.classList.remove('slide-enter');
                slideContent.classList.add('slide-active');

                // Scroll stage top
                slideContent.scrollTop = 0;
            }, 150);

            // Update UI Counters & Nav Buttons
            document.getElementById('slideCounter').textContent = `Slide ${currentSlide + 1} / ${slidesData.length}`;
            document.getElementById('progressBar').style.width = `${((currentSlide + 1) / slidesData.length) * 100}%`;

            document.getElementById('btnPrev').disabled = (currentSlide === 0);
            
            const btnNext = document.getElementById('btnNext');
            if (currentSlide === slidesData.length - 1) {
                btnNext.innerHTML = `<span class="hidden sm:inline">Hoàn thành</span> <i class="fa-solid fa-check"></i>`;
                btnNext.onclick = () => goToSlide(0);
            } else {
                btnNext.innerHTML = `<span class="hidden sm:inline">Tiếp theo</span> <i class="fa-solid fa-chevron-right"></i>`;
                btnNext.onclick = nextSlide;
            }

            updateDrawer();
        }

        // Slide Navigation
        function nextSlide() {
            if (currentSlide < slidesData.length - 1) {
                renderSlide(currentSlide + 1);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                renderSlide(currentSlide - 1);
            }
        }

        function goToSlide(index) {
            renderSlide(index);
            // Close drawer on mobile
            if (window.innerWidth < 768) {
                const drawer = document.getElementById('slideDrawer');
                drawer.classList.add('-translate-x-full');
            }
        }

        // Sidebar Drawer Navigation List
        function updateDrawer() {
            const drawerList = document.getElementById('drawerList');
            drawerList.innerHTML = slidesData.map((s, idx) => `
                <button onclick="goToSlide(${idx})" class="w-full text-left p-2.5 rounded-xl text-xs transition flex items-center justify-between ${idx === currentSlide ? 'bg-red-500 text-white font-bold shadow-md' : 'hover:bg-slate-100 dark:hover:bg-slate-700/60 text-slate-700 dark:text-slate-300'}">
                    <div class="truncate pr-2">
                        <div class="truncate">${idx + 1}. ${s.title}</div>
                        <div class="text-[10px] opacity-80 font-normal truncate">${s.zhTitle}</div>
                    </div>
                    ${idx === currentSlide ? '<i class="fa-solid fa-circle-play text-xs shrink-0"></i>' : ''}
                </button>
            `).join('');
        }

        function toggleDrawer() {
            const drawer = document.getElementById('slideDrawer');
            drawer.classList.toggle('-translate-x-full');
        }

        // Theme Toggle
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        // Fullscreen Toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                }
            }
        }

        // Interactive Tab Switching in Slide 9
        function switchTab(tabId) {
            const tabs = ['tabWords', 'tabSentences', 'tabTwisters', 'tabQuiz'];
            const btns = {
                'tabWords': 'btnTabWords',
                'tabSentences': 'btnTabSentences',
                'tabTwisters': 'btnTabTwisters',
                'tabQuiz': 'btnTabQuiz'
            };

            tabs.forEach(t => {
                const el = document.getElementById(t);
                const btn = document.getElementById(btns[t]);
                if (el && btn) {
                    if (t === tabId) {
                        el.classList.remove('hidden');
                        btn.className = 'px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 shadow-sm text-red-600 font-bold';
                    } else {
                        el.classList.add('hidden');
                        btn.className = 'px-3 py-1.5 rounded-lg text-slate-600 dark:text-slate-300 hover:text-red-600';
                    }
                }
            });
        }

        // Interactive Quiz Verification in Slide 9
        function checkQuiz(qNum, option, isCorrect, btnEl) {
            if (answeredQuestions[qNum]) return;
            answeredQuestions[qNum] = true;

            const btns = document.querySelectorAll(`.q${qNum}-btn`);
            btns.forEach(b => b.disabled = true);

            if (isCorrect) {
                btnEl.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600');
                btnEl.innerHTML += ' <i class="fa-solid fa-circle-check ml-1"></i> ĐÚNG!';
                scoreCount++;
            } else {
                btnEl.classList.add('bg-red-500', 'text-white', 'border-red-600');
                btnEl.innerHTML += ' <i class="fa-solid fa-circle-xmark ml-1"></i> SAI!';
            }

            document.getElementById('quizScore').textContent = `Điểm: ${scoreCount} / 6`;
        }

        window.onload = function() {
            renderSlide(0);

            // Keyboard Arrow Key Navigation Controls
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === 'Space') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });
        };
