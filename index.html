<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher An Khang - Lớp Học Ngôn Ngữ</title>
    <!-- Tailwind CSS cho giao diện đơn giản & đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-btn.active {
            background-color: #0d9488;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header / Tiêu đề trang -->
    <header class="bg-white border-b border-slate-200 py-6 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-bold text-slate-900">Teacher An Khang</h1>
            <p class="text-slate-500 mt-1">Lớp Học Tiếng Anh • Tiếng Trung • Tiếng Việt Cho Người Trung Quốc</p>
        </div>
    </header>

    <!-- Navigation / Thanh chọn 3 mục -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 flex justify-center gap-2 py-3 overflow-x-auto">
            <button onclick="showTab('english')" id="btn-english" class="tab-btn active px-5 py-2.5 rounded-lg border border-slate-200 text-sm transition">
                1. Lớp Tiếng Anh
            </button>
            <button onclick="showTab('chinese')" id="btn-chinese" class="tab-btn px-5 py-2.5 rounded-lg border border-slate-200 text-sm transition">
                2. Lớp Tiếng Trung
            </button>
            <button onclick="showTab('vietnamese')" id="btn-vietnamese" class="tab-btn px-5 py-2.5 rounded-lg border border-slate-200 text-sm transition">
                3. Lớp Tiếng Việt (Cho Người TQ)
            </button>
        </div>
    </nav>

    <!-- Main Content Area / Nội dung chính -->
    <main class="max-w-4xl mx-auto px-4 py-8 flex-grow w-full">

        <!-- MỤC 1: TIẾNG ANH -->
        <section id="tab-english" class="tab-content bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <h2 class="text-2xl font-bold text-teal-700 border-b pb-3">Các Lớp Tiếng Anh</h2>
            <!-- Nội dung bạn sẽ bổ sung sau -->
        </section>

        <!-- MỤC 2: TIẾNG TRUNG -->
        <section id="tab-chinese" class="tab-content hidden bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <h2 class="text-2xl font-bold text-teal-700 border-b pb-3">Các Lớp Tiếng Trung (汉语课程)</h2>
            <!-- Nội dung bạn sẽ bổ sung sau -->
        </section>

        <!-- MỤC 3: TIẾNG VIỆT CHO NGƯỜI TRUNG QUỐC -->
        <section id="tab-vietnamese" class="tab-content hidden bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <h2 class="text-2xl font-bold text-teal-700 border-b pb-3">Lớp Tiếng Việt Cho Người Trung Quốc (越南语课程)</h2>
            <!-- Nội dung bạn sẽ bổ sung sau -->
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400">
        <p>© Teacher An Khang - ankhang2908.github.io</p>
    </footer>

    <!-- JavaScript chuyển Tab -->
    <script>
        function showTab(tabName) {
            // Ẩn tất cả các nội dung tab
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.add('hidden'));

            // Bỏ màu nổi bật ở tất cả các nút
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Hiện tab được chọn & làm nổi bật nút tương ứng
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.getElementById('btn-' + tabName).classList.add('active');
        }
    </script>
</body>
</html>
